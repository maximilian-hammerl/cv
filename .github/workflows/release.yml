name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Compile PDF for German
        run: typst compile --input jsonFile=data-de.json main.typ cv-de.pdf

      - name: Compile PDF for English
        run: typst compile --input jsonFile=data-en.json main.typ cv-en.pdf

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          files: "*.pdf"
          fail_on_unmatched_files: true
