name: "Release"

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Typst
        uses: typst-community/setup-typst@v4

      - name: Read Typst version
        id: typst_version
        run: echo "version=$(typst --version)" >> "$GITHUB_OUTPUT"

      - name: Compile PDFs with Typst
        env:
          RELEASE_VERSION: ${{ github.ref_name }}
        run: ./compile.sh

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: false
          body: |
            > Generated with `${{ steps.typst_version.outputs.version }}`
          files: "*.pdf"
          fail_on_unmatched_files: true
